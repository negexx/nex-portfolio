name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: mlsecops-agent

jobs:
  test:
    name: pytest + mypy + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: mlsecops-agent/pyproject.toml

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy src/

      - name: Tests
        run: uv run pytest -q

      - name: Eval baseline check
        run: uv run mlsecops eval --min-recall 1.0

  self-audit:
    name: self-audit (v1 NIDS notebook -> SARIF -> Code Scanning)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: mlsecops-agent/pyproject.toml

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --extra dev

      # Audit the intentionally-vulnerable v1 NIDS notebook and emit a SARIF
      # report. The "|| true" lets the job continue past the non-zero exit
      # code that HIGH/CRITICAL findings produce — we *want* findings here;
      # the SARIF upload is the deliverable.
      - name: Audit v1 baseline -> SARIF
        run: uv run mlsecops audit ../nids_v1_baseline.ipynb --sarif v1_audit.sarif || true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mlsecops-agent/v1_audit.sarif
          category: mlsecops-agent
