name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: mlsecops-agent

jobs:
  test:
    name: pytest + mypy + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: mlsecops-agent/pyproject.toml

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy src/

      - name: Tests
        run: uv run pytest -q

      - name: Eval baseline check
        run: uv run mlsecops eval --min-recall 1.0
